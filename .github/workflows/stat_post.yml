name: Stat Post (Tue, Thu, Sat)

on:
  schedule:
    - cron: '0 10 * * 2'   # Tuesday  6PM SGT = 10:00 AM UTC
    - cron: '0 10 * * 4'   # Thursday 6PM SGT = 10:00 AM UTC
    - cron: '0 10 * * 6'   # Saturday 6PM SGT = 10:00 AM UTC
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install fonts dependency
        run: sudo apt-get install -y fonts-liberation

      - name: Create output directory
        run: mkdir -p output_images

      - name: Run pipeline
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_ID:      ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          HF_API_TOKEN:    ${{ secrets.HF_API_TOKEN }}
        run: python main.py

      - name: Upload image artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: stat-post-image
          path: output_images/
          retention-days: 7
